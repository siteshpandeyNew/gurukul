<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Gurukul Mission School</title>
    <meta name="description"
        content="Get in touch with Gurukul Mission School. Contact us for admissions, queries, and more.">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="site-header"></div>
    <section class="page-hero">
        <div class="container">
            <h1>Contact Us</h1>
            <p>We'd love to hear from you</p>
            <div class="breadcrumb"><a href="../index.html">Home</a> <span>/</span> <span>Contact</span></div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="grid grid-4 reveal" style="margin-bottom:50px;">
                <div class="card" style="text-align:center;">
                    <i class="fas fa-map-marker-alt"
                        style="font-size:2rem;color:var(--primary);margin-bottom:12px;display:block;"></i>
                    <h4>Address</h4>
                    <p>Nr. ITI Mandi Road, Near Iti, Khaas, Deoria – 274001, UP</p>
                </div>
                <div class="card" style="text-align:center;">
                    <i class="fas fa-phone-alt"
                        style="font-size:2rem;color:var(--primary);margin-bottom:12px;display:block;"></i>
                    <h4>Phone</h4>
                    <p><a href="tel:+919415341939" style="color:var(--primary);">+91-9415341939</a><br><a
                            href="tel:+919651655835" style="color:var(--primary);">+91-9651655835</a></p>
                </div>
                <div class="card" style="text-align:center;">
                    <i class="fas fa-envelope"
                        style="font-size:2rem;color:var(--primary);margin-bottom:12px;display:block;"></i>
                    <h4>Email</h4>
                    <p><a href="mailto:info@gurukulmissionschool.com" style="color:var(--primary);">info@gurukulmission
                            school.com</a></p>
                </div>
                <div class="card" style="text-align:center;">
                    <i class="fas fa-clock"
                        style="font-size:2rem;color:var(--primary);margin-bottom:12px;display:block;"></i>
                    <h4>Office Hours</h4>
                    <p>Mon-Fri: 8AM - 4PM<br>Sat: 9AM - 1PM<br>Sun: Closed</p>
                </div>
            </div>

            <div class="grid grid-2 reveal">
                <div>
                    <h2>Send us a Message</h2>
                    <div class="divider"
                        style="width:60px;height:3px;background:var(--secondary);margin:16px 0;border-radius:2px;">
                    </div>
                    <form id="contactForm" style="margin-top:24px;">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Your Name <span class="required">*</span></label>
                                <input type="text" name="name" placeholder="Enter your name" required id="contactName">
                            </div>
                            <div class="form-group">
                                <label>Email <span class="required">*</span></label>
                                <input type="email" name="email" placeholder="Enter your email" required
                                    id="contactEmail">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Subject <span class="required">*</span></label>
                            <input type="text" name="subject" placeholder="What is this regarding?" required
                                id="contactSubject">
                        </div>
                        <div class="form-group">
                            <label>Message <span class="required">*</span></label>
                            <textarea name="message" placeholder="Write your message here..." rows="5" required
                                id="contactMessage"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-large" id="contactSubmit">
                            <i class="fas fa-paper-plane"></i> Send Message
                        </button>
                    </form>
                </div>
                <div>
                    <h2>Find Us</h2>
                    <div class="divider"
                        style="width:60px;height:3px;background:var(--secondary);margin:16px 0;border-radius:2px;">
                    </div>
                    <div class="map-container" style="margin-top:24px;">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3564.5!2d83.78!3d26.5!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2sDeoria%2C+Uttar+Pradesh!5e0!3m2!1sen!2sin!4v1"
                            allowfullscreen="" loading="lazy" title="School Location Map"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="site-footer"></div>
    <script src="../assets/js/main.js"></script>
</body>

</html>
